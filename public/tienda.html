<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Tienda — Full Stock</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { slate: { 950: '#0a0f1e' } } } }
    }
  </script>

  <style>
    /* Card hover */
    .product-card { transition: transform .25s ease, box-shadow .25s ease; }
    .product-card:hover { transform: translateY(-6px); box-shadow: 0 24px 48px rgba(99,102,241,.18); }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #1e293b 25%, #2d3f57 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: .5rem;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display:inline-block; width:1rem; height:1rem;
            border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
            border-radius:50%; animation:spin .6s linear infinite;
            vertical-align:middle; margin-right:.4rem; }

    /* Toast */
    @keyframes toastIn  { from{opacity:0;transform:translate(-50%,14px)} to{opacity:1;transform:translate(-50%,0)} }
    @keyframes toastOut { from{opacity:1;transform:translate(-50%,0)}    to{opacity:0;transform:translate(-50%,14px)} }

    /* Modal fade */
    @keyframes modalIn  { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }

    /* Collection divider */
    .col-title::before {
      content:''; display:inline-block; width:4px; height:1.1em;
      background:linear-gradient(180deg,#6366f1,#8b5cf6); border-radius:2px;
      margin-right:.6rem; vertical-align:middle;
    }

    /* Scrollbar */
    .no-sb { -ms-overflow-style:none; scrollbar-width:none; }
    .no-sb::-webkit-scrollbar { display:none; }

    /* Input focus ring */
    .modal-input:focus { border-color:#6366f1 !important;
                          box-shadow:0 0 0 3px rgba(99,102,241,.2); }

    /* CSP-safe hover — sin onmouseover/onmouseout inline */
    .btn-modal-close { color:#475569; transition:color .15s; }
    .btn-modal-close:hover { color:#94a3b8; }
  </style>
</head>

<!-- ══════════════════════════════ SCRIPT ══ -->
<script>
'use strict';

// ─── Config ───────────────────────────────────────────────────────────────────
const TENANT = 'administrador';
const CATALOG_URL  = `/api/v1/store/${TENANT}/products`;
const CHECKOUT_URL = `/api/v1/store/${TENANT}/checkout`;

// ─── Estado global ────────────────────────────────────────────────────────────
let tenantWhatsapp = '';   // número sin '+', cargado desde la API
let pendingOrder   = null; // { collectionSlug, productId, name, price }

const stockMap = {};       // { [productId]: currentStock }

// ─── Detección de campos ──────────────────────────────────────────────────────
const ALIASES = {
  name:  ['nombre','name','titulo','title','producto','item'],
  price: ['precio','price','costo','cost','valor','value','monto','importe'],
  desc:  ['descripcion','description','detalle','detail','info','resumen','texto'],
  img:   ['imagen','image','foto','photo','picture','img','thumbnail','miniatura',
          'foto_url','image_url','imagen_url'],
};
function pick(item, type) {
  for (const k of ALIASES[type]) {
    const v = item[k];
    if (v != null && String(v).trim() !== '') return v;
  }
  return null;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  showSkeletons();
  loadCatalog();

  // ── Delegated click handler (CSP-safe: sin ningún onclick="..." en el HTML) ──
  // Un único listener en document captura todos los clics de la página.
  document.addEventListener('click', function (e) {

    // 1. Botón "Comprar" de una tarjeta de producto
    const buyBtn = e.target.closest('[data-action="comprar"]');
    if (buyBtn) {
      if (!buyBtn.disabled) abrirModal(buyBtn);
      return;
    }

    // 2. Cerrar modal — backdrop semitransparente
    if (e.target.id === 'modal-bd') {
      cerrarModal();
      return;
    }

    // 3. Cerrar modal — botón ✕
    if (e.target.closest('[data-action="cerrar-modal"]')) {
      cerrarModal();
      return;
    }

    // 4. Confirmar pedido
    const confirmBtn = e.target.closest('#modal-confirm-btn');
    if (confirmBtn) {
      if (!confirmBtn.disabled) confirmarPedido();
      return;
    }

    // 5. Reintentar carga del catálogo
    if (e.target.closest('[data-action="reintentar"]')) {
      loadCatalog();
      return;
    }
  });
});

// ─── Fetch catálogo ───────────────────────────────────────────────────────────
async function loadCatalog() {
  hide('state-error'); hide('state-empty'); hide('catalog');
  show('skeleton-grid');

  try {
    const res  = await fetch(CATALOG_URL);
    const json = await res.json();
    if (!json.success) throw new Error(json.message || 'Error en la API.');

    hide('skeleton-grid');

    // Guardar número de WhatsApp del tenant
    tenantWhatsapp = json.tenantWhatsapp || '';

    const collections = (json.collections || []).filter(c => c.items && c.items.length);
    const totalItems  = json.totalItems || 0;

    if (collections.length === 0) { show('state-empty'); return; }

    const storeLabel = json.tenantName || toLabel(TENANT);
    document.getElementById('hero-title').textContent = storeLabel;
    document.getElementById('hero-sub').textContent   =
      `${totalItems} producto${totalItems !== 1 ? 's' : ''} disponible${totalItems !== 1 ? 's' : ''}`;
    document.getElementById('nav-store').textContent   = storeLabel;
    document.getElementById('footer-name').textContent = storeLabel;
    document.getElementById('nav-count').textContent   =
      `${totalItems} producto${totalItems !== 1 ? 's' : ''}`;
    document.title = `${storeLabel} — Tienda`;

    buildNavTabs(collections);
    renderCatalog(collections);
    show('catalog');

  } catch (err) {
    hide('skeleton-grid');
    document.getElementById('error-msg').textContent = err.message || 'Error de red.';
    show('state-error');
  }
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function buildNavTabs(collections) {
  document.getElementById('nav-tabs').innerHTML = collections.map(col => `
    <a href="#col-${esc(col.slug)}"
       class="text-xs font-medium px-3 py-1.5 rounded-md text-slate-400
              hover:text-white hover:bg-slate-800 transition whitespace-nowrap">
      ${esc(col.name)}
    </a>
  `).join('');
}

// ─── Render secciones ────────────────────────────────────────────────────────
function renderCatalog(collections) {
  const wrap = document.getElementById('catalog');
  wrap.innerHTML = '';

  collections.forEach((col, ci) => {
    const section = document.createElement('section');
    section.id        = `col-${col.slug}`;
    section.className = ci > 0 ? 'mt-14' : '';

    const h2 = document.createElement('h2');
    h2.className   = 'col-title text-xl font-bold text-slate-200 mb-6';
    h2.textContent = col.name;
    section.appendChild(h2);

    const grid = document.createElement('div');
    grid.className = 'grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6';

    col.items.forEach(item => {
      stockMap[item.id] = Number(item.stock ?? 0);
      grid.appendChild(buildCard(item, col.slug));
    });

    section.appendChild(grid);
    wrap.appendChild(section);
  });
}

// ─── Tarjeta de producto ──────────────────────────────────────────────────────
function buildCard(item, collectionSlug) {
  const name  = pick(item, 'name')  || 'Producto';
  const price = pick(item, 'price');
  const desc  = pick(item, 'desc');
  const img   = pick(item, 'img');
  const stock = Number(item.stock ?? 0);

  const card = document.createElement('article');
  card.className     = 'product-card bg-slate-900 border border-slate-800 rounded-xl overflow-hidden';
  card.dataset.id    = item.id;
  card.dataset.colsl = collectionSlug;

  const imgHTML = img
    ? `<img src="${esc(img)}" alt="${esc(name)}"
            class="w-full h-full object-cover transition duration-500 hover:scale-110"
            loading="lazy">`
    : `<div class="h-52 bg-slate-800 flex items-center justify-center text-5xl">📦</div>`;

  const priceHTML = price != null
    ? `<span class="inline-block bg-gradient-to-r from-indigo-600 to-violet-600
                    text-white text-xs font-bold px-2.5 py-0.5 rounded-full">
         $${Number(price).toFixed(2)}
       </span>`
    : '';

  // Guardar los datos del producto como data-* para evitar problemas de escapado
  // en strings interpolados dentro de onclick (apóstrofes, comillas, URLs, etc.)
  const btnHTML = stock <= 0
    ? `<button disabled
               class="w-full mt-4 py-2.5 rounded-lg text-sm font-semibold
                      bg-slate-800 text-slate-600 cursor-not-allowed border
                      border-slate-700 btn-buy">Sin stock</button>`
    : `<button
         data-action="comprar"
         data-colslug="${esc(collectionSlug)}"
         data-id="${esc(item.id)}"
         data-name="${esc(name)}"
         data-price="${price != null ? Number(price) : 0}"
         data-img="${esc(img || '')}"
         class="w-full mt-4 py-2.5 rounded-lg text-sm font-bold
                bg-gradient-to-r from-indigo-600 to-violet-600
                hover:from-indigo-500 hover:to-violet-500 text-white
                transition-all duration-200 hover:shadow-lg
                hover:shadow-indigo-900/40 active:scale-[.97] btn-buy">
         🛍 Comprar 1 unidad
       </button>`;

  card.innerHTML = `
    <div class="overflow-hidden h-52 bg-slate-800">${imgHTML}</div>
    <div class="p-4">
      <div class="flex items-start justify-between gap-2 mb-2">
        <h3 class="font-bold text-slate-100 text-sm leading-snug flex-1">${esc(name)}</h3>
        ${priceHTML}
      </div>
      ${desc
        ? `<p class="text-slate-500 text-xs leading-relaxed mb-3 line-clamp-2">${esc(desc)}</p>`
        : '<div class="mb-3"></div>'}
      <div class="stock-badge">${buildStockBadge(stock)}</div>
      ${btnHTML}
    </div>`;

  // CSP no permite onerror inline — lo añadimos vía addEventListener
  if (img) {
    const imgEl = card.querySelector('img');
    if (imgEl) {
      imgEl.addEventListener('error', function () {
        this.parentElement.innerHTML =
          '<div class="h-52 bg-slate-800 flex items-center justify-center text-5xl">📦</div>';
      });
    }
  }

  return card;
}

// ─── Abrir modal ─────────────────────────────────────────────────────────────
function abrirModal(btnEl) {
  try {
    console.log('[abrirModal] click recibido', btnEl);

    // Leer datos desde los atributos data-* del botón
    const colslug = btnEl.dataset.colslug;
    const id      = btnEl.dataset.id;
    const name    = btnEl.dataset.name;
    const price   = parseFloat(btnEl.dataset.price) || 0;
    const img     = btnEl.dataset.img || '';
    const card    = btnEl.closest('article');

    console.log('[abrirModal] datos leídos:', { colslug, id, name, price, img, card });

    if (!colslug || !id) {
      console.error('[abrirModal] Faltan datos en el dataset del botón:', btnEl.dataset);
      toast('error', '❌ Error al leer los datos del producto. Recarga la página.');
      return;
    }

    pendingOrder = { collectionSlug: colslug, productId: id, name, price, cardEl: card };

function cerrarModal() {
  document.getElementById('modal-order').style.display = 'none';
  document.body.style.overflow = '';
  pendingOrder = null;
}

// Cerrar con Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') cerrarModal();
});

// ─── Confirmar pedido ─────────────────────────────────────────────────────────
async function confirmarPedido() {
  console.log('[confirmarPedido] inicio — pendingOrder:', pendingOrder);
  if (!pendingOrder) {
    console.error('[confirmarPedido] pendingOrder es null, abortando');
    return;
  }

  const nombre    = document.getElementById('modal-nombre').value.trim();
  const direccion = document.getElementById('modal-direccion').value.trim();
  const comentario= document.getElementById('modal-comentario').value.trim();
  const errEl     = document.getElementById('modal-error');

  // Validar campos obligatorios
  if (!nombre) {
    errEl.textContent   = 'Por favor ingresa tu nombre.';
    errEl.style.display = '';
    document.getElementById('modal-nombre').focus();
    return;
  }
  if (!direccion) {
    errEl.textContent   = 'Por favor ingresa la dirección o punto de retiro.';
    errEl.style.display = '';
    document.getElementById('modal-direccion').focus();
    return;
  }
  errEl.style.display = 'none';

  const btn = document.getElementById('modal-confirm-btn');
  btn.disabled  = true;
  btn.innerHTML = '<span class="spin"></span> Verificando stock…';

  try {
    // ── Fase 1: descontar stock en el backend ──────────────────────────────
    console.log('[confirmarPedido] enviando checkout a:', CHECKOUT_URL, {
      collectionSlug: pendingOrder.collectionSlug,
      productId: pendingOrder.productId,
    });

    const res  = await fetch(CHECKOUT_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        items: [{
          collectionSlug: pendingOrder.collectionSlug,
          productId:      pendingOrder.productId,
          quantity:       1,
        }],
      }),
    });
    const json = await res.json();
    console.log('[confirmarPedido] respuesta del backend:', json);

    if (!json.success) {
      console.warn('[confirmarPedido] backend devolvió error:', json.code, json.message);
      // Error de stock
      if (json.code === 'INSUFFICIENT_STOCK' || json.code === 'RACE_CONDITION') {
        // Actualizar tarjeta visualmente
        if (pendingOrder.cardEl) {
          const stockDiv = pendingOrder.cardEl.querySelector('.stock-badge');
          if (stockDiv) stockDiv.innerHTML = buildStockBadge(0);
          const buyBtn = pendingOrder.cardEl.querySelector('.btn-buy');
          if (buyBtn) {
            buyBtn.disabled   = true;
            buyBtn.textContent = 'Sin stock';
            buyBtn.style.cssText =
              'width:100%;margin-top:1rem;padding:.625rem;border-radius:.5rem;' +
              'background:#1e293b;color:#475569;border:1px solid #334155;' +
              'font-size:.875rem;font-weight:600;cursor:not-allowed';
          }
        }
        errEl.textContent   = '❌ ' + (json.message || 'Producto agotado.');
        errEl.style.display = '';
        btn.disabled  = false;
        btn.innerHTML = 'Sin stock disponible';
        btn.style.background = '#1e293b';
        btn.style.color      = '#64748b';
      } else {
        errEl.textContent   = json.message || 'Error al procesar el pedido.';
        errEl.style.display = '';
        btn.disabled  = false;
        btn.innerHTML = 'Reintentar';
      }
      return;
    }

    // ── Fase 2: stock descontado OK → actualizar tarjeta ──────────────────
    const orderItem  = json.order.items[0];
    const nuevoStock = Number(orderItem.stockRestante);
    console.log('[confirmarPedido] stock restante:', nuevoStock);
    stockMap[pendingOrder.productId] = nuevoStock;

    if (pendingOrder.cardEl) {
      const stockDiv = pendingOrder.cardEl.querySelector('.stock-badge');
      if (stockDiv) stockDiv.innerHTML = buildStockBadge(nuevoStock);
      if (nuevoStock <= 0) {
        const buyBtn = pendingOrder.cardEl.querySelector('.btn-buy');
        if (buyBtn) {
          buyBtn.disabled    = true;
          buyBtn.textContent = 'Sin stock';
          buyBtn.style.cssText =
            'width:100%;margin-top:1rem;padding:.625rem;border-radius:.5rem;' +
            'background:#1e293b;color:#475569;border:1px solid #334155;' +
            'font-size:.875rem;font-weight:600;cursor:not-allowed';
        }
      }
    }

    // ── Fase 3: armar y abrir el enlace de WhatsApp ───────────────────────
    const storeLabel = document.getElementById('nav-store').textContent || 'la tienda';
    const precio     = pendingOrder.price > 0
      ? `$${Number(pendingOrder.price).toFixed(2)}`
      : 'a consultar';
    const now        = new Date().toLocaleString('es', {
      day:'2-digit', month:'short', year:'numeric',
      hour:'2-digit', minute:'2-digit',
    });

    let msg =
      `🛍 *Nuevo Pedido — ${storeLabel}*\n\n` +
      `👤 *Cliente:* ${nombre}\n` +
      `📍 *Entrega:* ${direccion}\n`;
    if (comentario) msg += `💬 *Notas:* ${comentario}\n`;
    msg +=
      `\n📦 *Producto:*\n` +
      `• ${pendingOrder.name} x1 — ${precio}\n` +
      `\n💰 *Total:* ${precio}\n` +
      `\n📅 ${now}`;

    const waNum  = (tenantWhatsapp || '').replace(/\D/g, '');
    const waText = encodeURIComponent(msg);
    console.log('[confirmarPedido] waNum:', waNum || '(no configurado)');

    if (waNum) {
      const waUrl = `https://wa.me/${waNum}?text=${waText}`;
      console.log('[confirmarPedido] abriendo WhatsApp:', waUrl.slice(0, 80) + '…');
      window.open(waUrl, '_blank');
    } else {
      // Si el dueño no configuró su número, copiar el mensaje al clipboard
      try { await navigator.clipboard.writeText(msg); } catch (_) {}
      toast('info', '⚠️ El dueño no configuró su WhatsApp. Mensaje copiado al portapapeles.');
    }

    cerrarModal();
    toast('success', '✅ ¡Pedido enviado! Revisa WhatsApp para confirmarlo.');
    console.log('[confirmarPedido] flujo completado con éxito');

  } catch (err) {
    console.error('[confirmarPedido] error inesperado:', err);
    errEl.textContent   = '⚠️ Error de conexión. Intenta de nuevo.';
    errEl.style.display = '';
    btn.disabled  = false;
    btn.innerHTML = 'Reintentar';
  }
}

// ─── Stock badge ──────────────────────────────────────────────────────────────
function buildStockBadge(n) {
  n = Number(n ?? 0);
  if (n <= 0) {
    return `<span style="display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;
                         font-weight:600;padding:.2rem .6rem;border-radius:9999px;
                         background:rgba(127,29,29,.4);color:#f87171;border:1px solid rgba(127,29,29,.4)">
              ⚠ Agotado</span>`;
  }
  if (n <= 5) {
    return `<span style="display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;
                         font-weight:600;padding:.2rem .6rem;border-radius:9999px;
                         background:rgba(120,53,15,.4);color:#fbbf24;border:1px solid rgba(120,53,15,.4)">
              ▲ Últimas ${n}</span>`;
  }
  return `<span style="display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;
                       font-weight:600;padding:.2rem .6rem;border-radius:9999px;
                       background:rgba(6,78,59,.4);color:#34d399;border:1px solid rgba(6,78,59,.4)">
            ✓ ${n} en stock</span>`;
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(type, msg) {
  const prev = document.querySelector('.fs-toast');
  if (prev) {
    prev.style.animation = 'toastOut .2s ease forwards';
    setTimeout(() => prev.remove(), 200);
  }
  const colors = {
    success: 'background:#065f46;border-color:#059669',
    error:   'background:#7f1d1d;border-color:#991b1b',
    info:    'background:#1e293b;border-color:#334155',
  };
  const el = document.createElement('div');
  el.className = 'fs-toast';
  el.style.cssText =
    'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;' +
    'display:flex;align-items:center;gap:.625rem;padding:.7rem 1.35rem;' +
    'border-radius:9999px;border:1px solid;font-size:.875rem;font-weight:600;color:#fff;' +
    'white-space:nowrap;max-width:calc(100vw - 2rem);' +
    'box-shadow:0 10px 30px rgba(0,0,0,.4);animation:toastIn .25s ease;' +
    (colors[type] || colors.info);
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => {
    if (el.parentNode) {
      el.style.animation = 'toastOut .25s ease forwards';
      setTimeout(() => el.remove(), 250);
    }
  }, 3500);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toLabel(slug) {
  return slug.split(/[-_]/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
