<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- Evita que los proxies y navegadores sirvan versiones en caché del HTML -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <!-- v=20260527-4 — fingerprint para invalidar caché del navegador -->
  <title id="page-title">Tienda — Full Stock</title>

  <!-- Tailwind CSS via CDN + config externa (sin 'unsafe-inline' en CSP) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js?v=1"></script>

  <style>
    /* Card hover — subtler lift */
    .product-card { transition: transform .22s ease, box-shadow .22s ease; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 18px 36px rgba(99,102,241,.13); }

    /* Skeleton shimmer */
    .skeleton {
      background: linear-gradient(90deg, #1e293b 25%, #2d3f57 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: .5rem;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Spinner (checkout loading state) */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin {
      display: inline-block; width: 1rem; height: 1rem;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: .4rem;
    }

    /* Toast animations */
    @keyframes toastIn  { from{opacity:0;transform:translate(-50%,12px)} to{opacity:1;transform:translate(-50%,0)} }
    @keyframes toastOut { from{opacity:1;transform:translate(-50%,0)}    to{opacity:0;transform:translate(-50%,12px)} }

    /* Modal entrance */
    @keyframes modalIn  { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }

    /* Section heading accent bar */
    .col-title::before {
      content: ''; display: inline-block;
      width: 3px; height: 1em;
      background: #6366f1; border-radius: 2px;
      margin-right: .55rem; vertical-align: middle;
    }

    /* Hide scrollbar utility */
    .no-sb { -ms-overflow-style: none; scrollbar-width: none; }
    .no-sb::-webkit-scrollbar { display: none; }

    /* Modal input focus ring */
    .modal-input:focus {
      border-color: #6366f1 !important;
      box-shadow: 0 0 0 3px rgba(99,102,241,.18);
    }

    /* Modal close button hover (CSP-safe: sin onmouseover inline) */
    .btn-modal-close { color: #475569; transition: color .15s; }
    .btn-modal-close:hover { color: #94a3b8; }

    /* Qty buttons */
    .btn-qty {
      width: 2.25rem; height: 2.25rem; border-radius: .5rem;
      border: 1px solid #334155; background: #0f172a;
      color: #e2e8f0; font-size: 1.25rem; font-weight: 300; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s, border-color .15s;
      user-select: none;
    }
    .btn-qty:hover  { background: #1e293b; border-color: #6366f1; color: #fff; }
    .btn-qty:active { background: #334155; }

    /* Hide number-input spin arrows */
    .qty-input::-webkit-outer-spin-button,
    .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .qty-input { -moz-appearance: textfield; }

    /* ── Offcanvas Drawer ──────────────────────────────────────────────────────
       El panel se oculta trasladándolo fuera de la pantalla por la derecha.
       Añadir la clase .is-open (vía JS) lo hace deslizar hacia adentro.
       Sin inline style ni inline handlers — 100 % CSP-compliant.           */
    .drawer-panel {
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    .drawer-panel.is-open { transform: translateX(0); }

    /* Overlay que aparece detrás del drawer */
    .drawer-overlay {
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .drawer-overlay.is-open { opacity: 1; pointer-events: auto; }

    /* ── Buscador de productos ──────────────────────────────────── */
    #search-bar:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.18);
    }
    /* Ocultar botón nativo "×" del input type=search en Chrome/Safari */
    #search-bar::-webkit-search-cancel-button { -webkit-appearance: none; }
  </style>
</head>

<body class="dark bg-slate-950 text-slate-100 min-h-screen">


<!-- ══════════════════════════════ NAVBAR ══ -->
<nav class="fixed top-0 left-0 right-0 z-40 bg-slate-900/95 backdrop-blur-sm
            border-b border-slate-800 h-14">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 h-full flex items-center gap-4">

    <!-- Logo -->
    <a href="#" class="flex items-center gap-2.5 shrink-0">
      <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
        </svg>
      </div>
      <span class="font-semibold text-sm text-slate-200 hidden sm:inline"
            id="nav-store">Tienda</span>
    </a>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Product count -->
    <span id="nav-count"
          class="text-xs text-slate-500 shrink-0 hidden md:block whitespace-nowrap"></span>

    <!-- Botón "Categorías" — abre el offcanvas drawer.
         data-action="abrir-drawer" es capturado por el delegated listener en tienda.js.
         Cero inline handlers: sin onclick, sin onmouseover. -->
    <button data-action="abrir-drawer"
            class="flex items-center gap-1.5 text-xs font-semibold text-slate-400
                   hover:text-slate-100 transition px-3 py-2 rounded-lg
                   border border-slate-700 hover:border-slate-500 hover:bg-slate-800/50">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h10"/>
      </svg>
      Categorías
    </button>
  </div>
</nav>


<!-- ══════════════════════════════ HERO ══ -->
<div class="pt-14">
  <header class="relative overflow-hidden"
          style="background:linear-gradient(135deg,#0a0f1e 0%,#0f0d28 50%,#0e0a1f 100%)">
    <div style="position:absolute;top:-100px;right:-80px;width:480px;height:480px;
                border-radius:50%;pointer-events:none;
                background:radial-gradient(circle,rgba(99,102,241,.1) 0%,transparent 70%)"></div>
    <div style="position:absolute;bottom:-60px;left:-60px;width:320px;height:320px;
                border-radius:50%;pointer-events:none;
                background:radial-gradient(circle,rgba(139,92,246,.07) 0%,transparent 70%)"></div>
    <div class="relative max-w-6xl mx-auto px-6 py-14 text-center">
      <div class="inline-flex items-center gap-2 bg-indigo-500/10 border border-indigo-500/20
                  text-indigo-400 text-xs font-semibold uppercase tracking-widest
                  px-4 py-1.5 rounded-full mb-5">
        <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse"></span>
        Catálogo en vivo
      </div>
      <h1 class="text-4xl sm:text-5xl font-bold text-white leading-tight mb-3"
          id="hero-title">Cargando…</h1>
      <p class="text-slate-400 text-base max-w-md mx-auto" id="hero-sub"></p>
    </div>
  </header>
</div>


<!-- ══════════════════════════════ CATÁLOGO ══ -->
<main class="max-w-6xl mx-auto px-4 sm:px-6 py-10" id="main">
  <!-- ══ Barra de filtros: buscador + píldoras de categoría ══
       Permanece oculta hasta que loadCatalog() confirme colecciones disponibles.
       La clase .hidden se retira vía show('filter-bar') en tienda.js. -->
  <div id="filter-bar" class="hidden mb-8">

    <!-- Buscador de texto -->
    <div class="relative mb-3">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4
                  text-slate-600 pointer-events-none"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
      </svg>
      <!-- id="search-bar" — evento 'input' registrado en tienda.js vía addEventListener -->
      <input id="search-bar" type="search" placeholder="Buscar productos…"
             class="w-full bg-slate-900 border border-slate-800 text-slate-100
                    rounded-xl pl-10 pr-4 py-3 text-sm outline-none transition-colors
                    placeholder:text-slate-600">
    </div>

    <!-- Píldoras de categoría — inyectadas por renderCategoryPills() en tienda.js.
         data-action="filter-cat" capturado por el delegated listener (caso 12). -->
    <div id="categories-pills-container"
         class="flex gap-2 overflow-x-auto py-1 whitespace-nowrap scroll-smooth no-sb">
    </div>
  </div>

  <div id="skeleton-grid"
       class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  <div id="catalog"></div>

  <!-- Error state -->
  <div id="state-error" class="hidden text-center py-24">
    <div class="w-14 h-14 rounded-full bg-red-900/30 border border-red-900/40
                flex items-center justify-center mx-auto mb-5">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-red-400"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0
             2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126z
             M12 15.75h.007v.008H12v-.008z"/>
      </svg>
    </div>
    <h2 class="text-xl font-bold text-slate-200 mb-2">No se pudo cargar la tienda</h2>
    <p id="error-msg" class="text-slate-500 text-sm mb-6 max-w-sm mx-auto"></p>
    <!-- data-action="reintentar" es capturado por el delegated listener en tienda.js -->
    <button data-action="reintentar"
            class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm
                   px-6 py-2.5 rounded-lg transition">Reintentar</button>
  </div>

  <!-- Empty state -->
  <div id="state-empty" class="hidden text-center py-24">
    <div class="w-14 h-14 rounded-full bg-slate-800 border border-slate-700
                flex items-center justify-center mx-auto mb-5">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-slate-500"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0
             01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504
             1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504
             -1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
      </svg>
    </div>
    <h2 class="text-xl font-bold text-slate-300 mb-2">El catálogo está vacío</h2>
    <p class="text-slate-500 text-sm">Agrega productos desde el panel de administración.</p>
  </div>
</main>


<!-- ══════════════════════════════ FOOTER ══ -->
<footer class="bg-slate-900 border-t border-slate-800 py-8 mt-4">
  <div class="max-w-6xl mx-auto px-6 flex flex-col sm:flex-row
              items-center justify-between gap-3 text-sm">
    <div class="flex items-center gap-2">
      <div class="w-6 h-6 rounded-md bg-indigo-600 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-white"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
        </svg>
      </div>
      <span class="text-slate-300 font-semibold" id="footer-name">Tienda</span>
    </div>
    <p class="text-xs text-slate-600 text-center">
      Inventario gestionado por
      <span class="text-indigo-400 font-semibold">Full Stock</span>
    </p>
  </div>
</footer>


<!-- ══════════════════════════════ DRAWER OVERLAY ══ -->
<!-- Fondo oscuro semitransparente detrás del panel.
     Clase .drawer-overlay — toggling de .is-open controlado por tienda.js.
     Click capturado por delegated listener (e.target.id === 'drawer-overlay'). -->
<div id="drawer-overlay"
     class="drawer-overlay fixed inset-0 bg-black/60 backdrop-blur-sm"
     style="z-index:45"></div>

<!-- ══════════════════════════════ DRAWER PANEL ══ -->
<!-- Panel lateral que desliza desde la derecha.
     Clase .drawer-panel — .is-open añadida/quitada por abrirDrawer()/cerrarDrawer() en tienda.js.
     Sin inline handlers de ningún tipo. -->
<div id="drawer"
     class="drawer-panel fixed top-0 right-0 h-full w-64
            bg-slate-900 border-l border-slate-800 flex flex-col"
     style="z-index:46">

  <!-- Header del drawer -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-slate-800">
    <span class="text-sm font-semibold text-slate-200 tracking-wide">Categorías</span>
    <!-- data-action="cerrar-drawer" → capturado por delegated listener en tienda.js -->
    <button data-action="cerrar-drawer"
            class="p-1.5 rounded-md text-slate-500 hover:text-slate-300
                   hover:bg-slate-800 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Links de categoría — inyectados por buildDrawerLinks() en tienda.js -->
  <nav id="drawer-links" class="flex-1 overflow-y-auto no-sb py-2 px-2"></nav>
</div>


<!-- ══════════════════════════════ MODAL PEDIDO ══ -->
<div id="modal-order"
     style="display:none;position:fixed;inset:0;z-index:9000;
            align-items:center;justify-content:center;padding:1rem">
  <!-- Backdrop — cerrar modal al hacer click (e.target.id === 'modal-bd' en tienda.js) -->
  <div id="modal-bd"
       style="position:absolute;inset:0;background:rgba(0,0,0,.75);
              backdrop-filter:blur(4px)"></div>

  <!-- Card del modal -->
  <div style="position:relative;width:100%;max-width:440px;
              background:#1e293b;border:1px solid #334155;border-radius:.875rem;
              padding:0;z-index:1;animation:modalIn .2s ease-out;
              max-height:90dvh;overflow-y:auto">

    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;
                padding:1.25rem 1.5rem;border-bottom:1px solid #334155">
      <div>
        <h2 style="color:#f1f5f9;font-size:.9375rem;font-weight:700;
                   letter-spacing:-.01em;margin:0 0 .15rem">Confirmar pedido</h2>
        <p id="modal-product-name"
           style="color:#6366f1;font-size:.78rem;font-weight:500;margin:0"></p>
      </div>
      <!-- data-action="cerrar-modal" → capturado por delegated listener en tienda.js -->
      <button data-action="cerrar-modal"
              class="btn-modal-close"
              style="background:none;border:none;cursor:pointer;
                     padding:.3rem;border-radius:.375rem">
        <svg xmlns="http://www.w3.org/2000/svg" style="width:1.1rem;height:1.1rem"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Resumen del producto -->
    <div id="modal-product-summary"
         style="padding:.875rem 1.5rem;background:#0f172a;
                border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:.875rem">
    </div>

    <!-- Selector de cantidad -->
    <div style="padding:.875rem 1.5rem;border-bottom:1px solid #334155">
      <label style="display:block;font-size:.7rem;font-weight:600;color:#94a3b8;
                     text-transform:uppercase;letter-spacing:.06em;margin-bottom:.55rem">
        Cantidad
      </label>
      <div style="display:flex;align-items:center;gap:.75rem">
        <!-- data-action manejados por el delegated listener en tienda.js -->
        <button id="qty-minus" class="btn-qty" aria-label="Restar cantidad">−</button>
        <input id="modal-qty" type="number" value="1" min="1" max="99"
               class="modal-input qty-input"
               style="width:3.75rem;text-align:center;padding:.45rem .25rem;
                      font-size:.95rem;font-weight:700;background:#0f172a;color:#f1f5f9;
                      border:1px solid #334155;border-radius:.5rem;outline:none;
                      transition:border-color .15s"/>
        <button id="qty-plus" class="btn-qty" aria-label="Sumar cantidad">+</button>
        <div style="flex:1;text-align:right;min-width:0">
          <span style="display:block;font-size:.65rem;color:#475569;
                       text-transform:uppercase;letter-spacing:.05em;margin-bottom:.1rem">Total</span>
          <span id="modal-total-price"
                style="font-size:1.05rem;font-weight:700;color:#6366f1">—</span>
        </div>
      </div>
    </div>

    <!-- Campos del formulario -->
    <div style="padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1rem">

      <div>
        <label style="display:block;font-size:.7rem;font-weight:600;color:#94a3b8;
                       text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem">
          Tu nombre <span style="color:#ef4444">*</span>
        </label>
        <input id="modal-nombre" type="text" placeholder="Ej: Juan Pérez"
               autocomplete="name" class="modal-input"
               style="width:100%;box-sizing:border-box;background:#0f172a;
                      border:1px solid #334155;border-radius:.5rem;color:#f1f5f9;
                      padding:.55rem .75rem;font-size:.875rem;outline:none;
                      transition:border-color .15s"/>
      </div>

      <div>
        <label style="display:block;font-size:.7rem;font-weight:600;color:#94a3b8;
                       text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem">
          Dirección de entrega o retiro <span style="color:#ef4444">*</span>
        </label>
        <input id="modal-direccion" type="text"
               placeholder="Ej: Av. Principal 123 — o — Retiro en tienda"
               autocomplete="street-address" class="modal-input"
               style="width:100%;box-sizing:border-box;background:#0f172a;
                      border:1px solid #334155;border-radius:.5rem;color:#f1f5f9;
                      padding:.55rem .75rem;font-size:.875rem;outline:none;
                      transition:border-color .15s"/>
      </div>

      <div>
        <label style="display:block;font-size:.7rem;font-weight:600;color:#94a3b8;
                       text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem">
          Comentario <span style="color:#475569;font-weight:400">(opcional)</span>
        </label>
        <textarea id="modal-comentario" rows="2"
                  placeholder="Ej: Pago en efectivo, llegar después de las 18 h…"
                  class="modal-input"
                  style="width:100%;box-sizing:border-box;background:#0f172a;
                         border:1px solid #334155;border-radius:.5rem;color:#f1f5f9;
                         padding:.55rem .75rem;font-size:.875rem;outline:none;
                         resize:vertical;transition:border-color .15s"></textarea>
      </div>

      <!-- Error inline -->
      <div id="modal-error"
           style="display:none;background:#450a0a;border:1px solid #7f1d1d;
                  border-radius:.5rem;color:#fca5a5;font-size:.8rem;
                  padding:.65rem 1rem"></div>

      <!-- Botón de confirmación — id="#modal-confirm-btn" capturado en tienda.js -->
      <button id="modal-confirm-btn"
        style="width:100%;padding:.75rem;border-radius:.625rem;border:none;cursor:pointer;
               background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;
               font-weight:700;font-size:.875rem;letter-spacing:.015em;
               display:flex;align-items:center;justify-content:center;gap:.625rem;
               transition:opacity .15s;margin-top:.25rem">
        <svg xmlns="http://www.w3.org/2000/svg" style="width:1.1rem;height:1.1rem;flex-shrink:0"
             fill="currentColor" viewBox="0 0 24 24">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15
                   -.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463
                   -2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606
                   .134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371
                   -.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51
                   -.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04
                   1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2
                   5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118
                   .571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413
                   -.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.857L.054 23.25
                   a.75.75 0 00.916.921l5.562-1.48A11.946 11.946 0 0012 24c6.627 0
                   12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.659-.514-5.175-1.407
                   l-.371-.22-3.844 1.022 1.022-3.742-.242-.386A9.955 9.955 0 012 12
                   C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
        </svg>
