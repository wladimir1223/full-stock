<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restablecer contraseña | Full Stock</title>
  <style>
    *      { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      background: #020617; color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 400px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .brand { text-align: center; margin-bottom: 22px; }
    .logo {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 22px; color: #fff;
    }
    .brand h1 { margin: 12px 0 0; font-size: 20px; font-weight: 700; }
    .brand h1 .a { color: #fff; }
    .brand h1 .b { color: #818cf8; }
    .title    { font-size: 16px; font-weight: 600; margin: 4px 0 4px; }
    .subtitle { font-size: 13px; color: #94a3b8; margin: 0 0 20px; line-height: 1.5; }
    label {
      display: block; font-size: 12px; font-weight: 500; color: #94a3b8;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em;
    }
    .field { margin-bottom: 16px; }
    input[type="password"] {
      width: 100%; background: #020617; border: 1px solid #334155;
      border-radius: 10px; color: #f1f5f9; padding: 12px 14px;
      font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input[type="password"]:focus {
      border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.2);
    }
    input::placeholder { color: #475569; }
    .btn {
      width: 100%; border: none; cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-weight: 600; font-size: 15px;
      padding: 13px; border-radius: 10px; margin-top: 4px;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover:not(:disabled)  { opacity: .9; }
    .btn:active:not(:disabled) { transform: scale(.98); }
    .btn:disabled              { opacity: .5; cursor: not-allowed; }
    .msg {
      display: none; font-size: 13px; line-height: 1.5;
      border-radius: 10px; padding: 12px 14px; margin-bottom: 16px;
    }
    .msg.error   { display: block; background: rgba(127,29,29,.35); border: 1px solid #991b1b; color: #fca5a5; }
    .msg.success { display: block; background: rgba(6,78,59,.35);  border: 1px solid #047857; color: #6ee7b7; }
    .hint { font-size: 11px; color: #64748b; margin-top: 6px; }
    .foot { text-align: center; margin-top: 20px; }
    .foot a { color: #818cf8; font-size: 13px; text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
    .spinner {
      display: inline-block; width: 16px; height: 16px; vertical-align: -3px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div class="logo">FS</div>
        <h1><span class="a">Full</span><span class="b">Stock</span></h1>
      </div>

      <h2 class="title">Restablecer contraseña</h2>
      <p class="subtitle">Introduce tu nueva contraseña. Debe tener al menos 8 caracteres.</p>

      <div id="msg" class="msg"></div>

      <form id="reset-form" autocomplete="off">
        <div class="field">
          <label for="password">Nueva contraseña</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label for="confirm">Confirmar contraseña</label>
          <input id="confirm" type="password" placeholder="••••••••" autocomplete="new-password"/>
          <p class="hint">Vuelve a escribir la misma contraseña.</p>
        </div>
        <button id="submit-btn" class="btn" type="submit">Guardar nueva contraseña</button>
      </form>

      <div class="foot">
        <a id="back-login" href="/">← Volver al inicio de sesión</a>
      </div>
    </div>
  </div>

  <script src="/js/reset-password.js?v=1"></script>
</body>
</html>
