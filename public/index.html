<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Full Stock | Panel de Administración</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: {
              950: '#0a0f1e',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.2s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%':   { opacity: '0', transform: 'translateY(-4px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Estilos utilitarios personalizados (componentes reutilizables) -->
  <style>
    /* Scrollbar personalizado */
    ::-webkit-scrollbar       { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    /* Clases de componentes — no disponibles vía JIT en CDN, las definimos aquí */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.25rem;
    }

    .input-field {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      color: #f1f5f9;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .input-field:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }
    .input-field::placeholder { color: #475569; }
    textarea.input-field { resize: vertical; }
    select.input-field    { cursor: pointer; }

    .label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 0.375rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-weight: 600;
      font-size: 0.875rem;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover    { opacity: 0.9; }
    .btn-primary:active   { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: #1e293b;
      color: #cbd5e1;
      font-weight: 500;
      font-size: 0.875rem;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      border: 1px solid #334155;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #334155; }

    .btn-danger {
      background: #7f1d1d;
      color: #fca5a5;
      font-weight: 500;
      font-size: 0.875rem;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      border: 1px solid #991b1b;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-danger:hover { background: #991b1b; }

    .animate-fade-in {
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Offcanvas nav drawer (mobile) ─────────────────────────── */
    .nav-drawer-panel {
      transform: translateX(-100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    .nav-drawer-panel.is-open { transform: translateX(0); }

    .nav-overlay {
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
    }
    .nav-overlay.is-open { opacity: 1; pointer-events: auto; }

    /* ── Sidebar section labels ─────────────────────────────────── */
    .nav-section-label {
      display: block;
      font-size: .625rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: .09em;
      padding: 0 .625rem;
      margin-bottom: .3rem;
    }

    /* ── Nav item active state ──────────────────────────────────── */
    .nav-tab-active {
      background: rgba(99,102,241,.12) !important;
      color: #a5b4fc !important;
    }

    /* ── Nav group: submenu colapsable ──────────────────────────── */
    .nav-group-children {
      max-height: 0;
      overflow: hidden;
      transition: max-height .25s cubic-bezier(.4,0,.2,1);
    }
    .nav-group-children.is-open { max-height: 320px; }

    [data-group-arrow]          { transition: transform .2s ease; }
    [data-group-arrow].is-open  { transform: rotate(180deg); }

    /* ── API Hub: carpetas colapsables ───────────────────────────── */
    .hub-folder-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .38s cubic-bezier(.4,0,.2,1);
    }
    .hub-folder-body.is-open { max-height: 5000px; }

    [data-folder-arrow]         { transition: transform .2s ease; flex-shrink: 0; }
    [data-folder-arrow].is-open { transform: rotate(180deg); }

    /* ── Tabla hover en superadmin ───────────────────────────────── */
    .sa-row:hover { background: #162032; }

    /* ── Tap-target mínimo en móvil (44 px recomendado por WCAG) ───── */
    @media (max-width: 767px) {
      /* Botones con clase utilitaria */
      .btn-primary, .btn-secondary, .btn-danger {
        padding: 0.75rem 1.25rem;
        min-height: 2.75rem;
      }
      /* Botones de acción del header (soporte / logout / hamburguesa) */
      #nav-menu-btn, #support-btn, #logout-btn {
        min-width:  2.75rem;
        min-height: 2.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">

  <!-- El JS inyecta todo el layout aquí -->
  <div id="app">
    <div class="min-h-screen flex items-center justify-center">
      <div class="text-center">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center mx-auto mb-4 shadow-2xl">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold"><span class="text-white">Full</span><span class="text-indigo-400">Stock</span></h1>
        <p class="text-slate-500 text-sm mt-1">Iniciando…</p>
      </div>
    </div>
  </div>

  <!-- Chart.js — requerido por analytics.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Scripts — orden importante: api → módulos → orquestador -->
  <script src="/js/api.js?v=12"></script>
  <script src="/js/builder.js?v=11"></script>
  <script src="/js/content.js?v=15"></script>
  <script src="/js/catalog.js?v=13"></script>
  <script src="/js/superadmin.js?v=15"></script>
  <script src="/js/apihub.js?v=2"></script>
  <script src="/js/settings.js?v=13"></script>
  <script src="/js/analytics.js?v=2"></script>
  <script src="/js/app.js?v=15"></script>
</body>
</html>
